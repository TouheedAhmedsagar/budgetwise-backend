# ── NEW PostgreSQL (PRODUCTION - REQUIRED) ───────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=BudgetWiseSuperSecretKey2024MustBe256BitsLongHS256AlgorithmKey
app.jwt.expiration=86400000

# ── Budget Alert (80%) ──────────────────────────────────────
app.budget.warning-threshold=0.80

# ── CORS (LOCAL + DEPLOY) ───────────────────────────────────
app.cors.allowed-origins=http://127.0.0.1:5500,http://localhost:5500,https://*.onrender.com

# ── Server Port (IMPORTANT FOR RENDER) ──────────────────────
server.port=${PORT:8080}

# ── Gmail SMTP ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

